<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Login</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icon cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
      *{
        font-family: "Geist", sans-serif;
     }
    </style>

</head>
<body class="bg-[#F8FAFC]">
    <section class="min-h-screen max-w-md mx-auto py-10 ">
        <div class="bg-white shadow p-7 rounded-md">
           
           <div class="flex flex-col items-center text-center">
             <img src="./assets/github-logo.png" class="w-20 mb-4" alt="logo">
            <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
           </div>

  <fieldset class="fieldset rounded-box p-4 space-y-[2px]">
  <label class="label text-base text-[#1F2937]">Username</label>
  <input id="userName" type="text" class="input w-full text-base text-[#64748B] outline-none" placeholder="Enter Username" />
  <p class="text-sm text-[#4A00FF]">Default: admin</p>

  <label class="label text-base text-[#1F2937]">Password</label>
  <input id="user_pass" type="password" class="input w-full text-base text-[#64748B] outline-none " placeholder="Enter Password" />
  <p class="text-sm text-[#4A00FF]">Default: admin123</p>

  <button id="SignIn-btn" class="btn btn-primary mt-4">Sign In</button>

<div class="flex items-center my-6">
    <div class="flex-grow border-t border-[#E4E4E7]"></div>
    <span class="mx-3 text-[#64748B] font-medium">OR</span>
    <div class="flex-grow border-t border-gray-300"></div>
</div>

<div class="text-center">
    <p class="text-sm text-[#64748B] mb-5">Demo Credentials:</p>
    <p class="text-base text-[#1F2937]"><span class="font-semibold">Username:</span> admin</p>
    <p class="text-base text-[#1F2937]"><span class="font-semibold">Password:</span> admin123</p>
</div>
</fieldset>
</div>
</section>
   
<script src="script/login.js"></script>
</body>
</html>
