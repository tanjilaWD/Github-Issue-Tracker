<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icon cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
      *{
        font-family: "Geist", sans-serif;
     }
    </style>

</head>
<body class="bg-[#F8FAFC] min-h-screen ">
 <!-- navber section -->
 <header class="px-6 py-4 flex items-center justify-between bg-white border-b border-gray-200 ">
  <div class="flex items-center gap-2">
    <img src="./assets/github-logo.png" class="size-12" alt="logo">
    <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
  </div>

  <div>
    <label class="input outline-none">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
    </svg>
     <input type="search" required placeholder="Search issues..." />
    </label>
  </div>
 </header>

 <!-- buttons section -->
  <div class="bg-white mt-9 mb-5 p-5 shadow rounded container mx-auto">
    <button class="btn px-12 bg-primary text-white">All</button>
    <button class="btn px-9 text-[#64748B]">Open</button>
    <button class="btn px-9 text-[#64748B]">Closed</button>
  </div>

  <!-- total issue section -->
   <section class="container bg-white mx-auto">

    <!-- left side -->
     <div class="flex items-center justify-between p-5 shadow">
     <div class="flex items-center gap-2">
      <img src="./assets/Aperture.png" class="bg-gray-200 rounded-full border-3 border-gray-300 " alt="image">
      <div>
      <h2 class="text-[20px] font-semibold">50 Issues</h2>
      <p class="text-base text-[#64748B]">Track and manage your project issues</p>
      </div>
     </div>

     <!-- right side -->
      <div class="flex gap-3">
        <p class="flex items-center justify-center"><i class="fa-solid fa-circle text-[10px] mr-1 text-[#00A96E]"></i>Open</p>
        <p class="flex items-center justify-center"><i class="fa-solid fa-circle text-[10px] mr-1 text-[#A855F7]"></i>Closed</p>
      </div>
      </div>
   </section>

  



</body>
</html>
