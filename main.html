<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icon cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
      *{
        font-family: "Geist", sans-serif;
     }
    </style>

</head>
<body>
 <!-- navber section -->
 <header class="bg-black text-white px-6 py-4 flex items-center justify-between">
  <!-- Left side: Logo + Title -->
  <div class="flex items-center gap-3">
    <img src="./assets/github-logo.png" alt="logo" class="w-8 h-8">
    <h1 class="text-lg font-semibold">GitHub Issues Tracker</h1>
  </div>

  <!-- Right side: Search + Button -->
  <div class="flex items-center gap-3">
    <input 
      type="text" 
      placeholder="Search issues..." 
      class="px-3 py-1 rounded border border-gray-300 text-black focus:outline-none focus:ring-2 focus:ring-blue-500"
    >
    <button class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded font-medium">
      + New Issue
    </button>
  </div>
</header>
</body>
</html>
