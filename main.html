<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icon cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
      *{
        font-family: "Geist", sans-serif;
     }
    </style>

</head>

<body>
    <!-- navber section -->
 <header class="px-6 py-4 flex items-center justify-between bg-white border-b border-gray-200 ">
  <div class="flex items-center gap-2">
    <img src="./assets/github-logo.png" class="size-12" alt="logo">
    <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
  </div>
 
       <!-- search ber -->
      <section class="flex justify-center ">
       <div class="join">
  <div>
    <label class="input validator join-item">
        <g
          stroke-linejoin="round"
          stroke-linecap="round"
          stroke-width="2.5"
          fill="none"
          stroke="currentColor"
        >
          <rect width="20" height="16" x="2" y="4" rx="2"></rect>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
        </g>
      </svg>
      <input id="input-search" type="text" placeholder="Search issues..."/>
    </label>
  </div>
  <button id="btn-search" class="btn btn-primary join-item" onclick="searchIssues()">Search</button>
</div>
      </section>

 </header>
    <main class="w-11/12 mx-auto py-8 ">
        <section class="flex flex-wrap gap-2 bg-white p-6 rounded-lg shadows mb-6">
            <button id="btn-all" onclick="setActiveButton('btn-all'); loadHomepage()"
                class="btn btn-primary w-30">All</button>
            <button id="btn-open" onclick="setActiveButton('btn-open'); loadOpenIssues()"
                class="btn btn-outline btn-primary w-30">Open</button>
            <button id="btn-closed" onclick="setActiveButton('btn-closed'); loadClosedIssues()"
                class="btn btn-outline btn-primary w-30">Closed</button>
        </section>
        <section id="issue-container" class="bg-white p-6 rounded-t-lg shadows mb-1">

        </section>
        <section id="loder" class="flex justify-center items-center mt-20 hidden">
            <span class="loading loading-spinner loading-xl"></span>
        </section>
        <section class="bg-white p-6  shadows mb-6">
            <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">

            </div>

        </section>
    </main>

    <!-- Issue Detail Modal -->
    <dialog id="my_modal_1" class="modal">
        <div class="modal-box w-11/12 max-w-2xl">
            <div id="modal-content">
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>



   
<script src="script/main.js"></script>
</body>

</html>
